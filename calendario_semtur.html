<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>Calendário Cultural 2026 — SEMTUR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0a0a0f;
    --surface: #131318;
    --surface2: #1c1c25;
    --border: #2a2a3d;
    --red: #e63946;
    --red2: #ff6b6b;
    --gold: #ffd60a;
    --text: #f0f0f5;
    --muted: #6e6e8a;
    --white: #ffffff;
    --nav-h: 56px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

/* ========== SCREENS ========== */
.screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    transition: transform .32s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
}
.screen.hidden-right  { transform: translateX(100%); }
.screen.hidden-left   { transform: translateX(-30%); opacity: .5; }
.screen.active        { transform: translateX(0); opacity: 1; }

/* ========== NAV BAR ========== */
.nav-bar {
    height: var(--nav-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,.92);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
    position: relative;
}
.nav-back {
    display: flex;
    align-items: center;
    gap: .2rem;
    color: var(--red);
    font-size: .95rem;
    font-weight: 500;
    cursor: pointer;
    background: none;
    border: none;
    padding: .4rem .5rem;
    border-radius: 8px;
    transition: opacity .2s;
    min-width: 80px;
}
.nav-back:hover { opacity: .7; }
.nav-back svg { width: 10px; height: 16px; }
.nav-title {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    font-size: .82rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    white-space: nowrap;
}
.nav-right { min-width: 80px; display: flex; justify-content: flex-end; }

/* ========== TELA 1 — ANO ========== */
#screen-year .year-header {
    padding: .8rem 1rem .4rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}
#screen-year .year-logo {
    height: 44px;
    width: auto;
    cursor: pointer;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,.5));
    transition: transform .2s;
}
#screen-year .year-logo:hover { transform: scale(1.05); }
#screen-year .year-number {
    font-size: 2.6rem;
    font-weight: 700;
    color: var(--red);
    letter-spacing: -2px;
    line-height: 1;
}
#screen-year .year-sub {
    font-size: .7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .12em;
    margin-top: .1rem;
    text-align: right;
}

/* LEGENDA */
.legenda {
    display: flex;
    justify-content: center;
    gap: 1rem;
    padding: .3rem 1rem .5rem;
    flex-shrink: 0;
}
.leg-item { display: flex; align-items: center; gap: .35rem; font-size: .68rem; color: var(--muted); }
.leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* GRID ANO */
.year-grid-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: .4rem .8rem 1.5rem; }
.year-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: .7rem;
}
@media(max-width: 480px) { .year-grid { grid-template-columns: repeat(3, 1fr); gap: .5rem; } }

/* MINI MÊS */
.mini-month {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: .6rem .5rem .5rem;
    cursor: pointer;
    transition: all .18s;
    -webkit-tap-highlight-color: transparent;
}
.mini-month:active { transform: scale(.96); background: var(--surface2); }
.mini-month.current { border-color: var(--red); box-shadow: 0 0 16px rgba(230,57,70,.18); }
.mini-month-name {
    font-size: .72rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: .4rem;
    padding-left: .1rem;
}
.mini-month.current .mini-month-name { color: var(--red); }
.mini-wdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 2px;
}
.mini-wday { text-align: center; font-size: .48rem; color: var(--muted); padding: 1px 0; }
.mini-wday:first-child, .mini-wday:last-child { color: var(--red2); opacity: .7; }
.mini-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
.mini-day {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: .52rem;
    border-radius: 50%;
    position: relative;
    color: var(--text);
}
.mini-day.empty { color: transparent; }
.mini-day.sun, .mini-day.sat { color: var(--red2); opacity: .65; }
.mini-day.today { background: var(--red); color: white; font-weight: 700; }
.mini-day.has-ev::after {
    content: '';
    position: absolute;
    bottom: 1px; left: 50%;
    transform: translateX(-50%);
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--red2);
}
.mini-day.var-ev::after { background: var(--gold); }
.mini-day.today.has-ev::after { background: white; }

/* ========== TELA 2 — MÊS ========== */
#screen-month { }
.month-view-header {
    padding: .5rem 1rem .3rem;
    flex-shrink: 0;
}
.month-view-name {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
}
.month-wdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: .4rem 1rem .2rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
.month-wday {
    text-align: center;
    font-size: .82rem;
    font-weight: 700;
    color: var(--text);
    padding: .2rem 0;
    text-transform: uppercase;
    letter-spacing: .05em;
}
.month-wday:first-child, .month-wday:last-child { color: var(--red2); }
.month-days-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.month-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-left: 1px solid var(--border);
}
.month-day-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    min-height: 52px;
    padding: .35rem .25rem .25rem;
    position: relative;
    cursor: default;
    transition: background .15s;
    -webkit-tap-highlight-color: transparent;
}
.month-day-cell.clickable { cursor: pointer; }
.month-day-cell.clickable:active { background: var(--surface2); }
.month-day-cell.empty { background: rgba(0,0,0,.15); }
.month-day-num {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--white);
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    margin: 0 auto;
}
.month-day-cell.today .month-day-num {
    background: var(--red);
    color: white;
    font-weight: 700;
}
.month-day-cell.has-event .month-day-num { color: var(--white); font-weight: 700; }
.month-day-cell.sun .month-day-num,
.month-day-cell.sat .month-day-num { color: var(--red2); font-weight: 600; }
.month-day-cell.today.sun .month-day-num,
.month-day-cell.today.sat .month-day-num { color: white; }
.month-ev-dots { display: flex; justify-content: center; gap: 2px; margin-top: 2px; flex-wrap: wrap; }
.month-ev-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--red2);
    flex-shrink: 0;
}
.month-ev-dot.var { background: var(--gold); }
.month-ev-label {
    font-size: .52rem;
    color: var(--muted);
    text-align: center;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
    padding: 0 1px;
}

/* ========== TELA 3 — DIA ========== */
#screen-day { }
/* BARRA DE DIAS HORIZONTAL */
.day-bar-wrap {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
}
.day-bar-month {
    font-size: .68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    padding: .5rem 1rem .1rem;
}
.day-bar {
    display: flex;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: .3rem .6rem .5rem;
    gap: .3rem;
}
.day-bar::-webkit-scrollbar { display: none; }
.day-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 38px;
    padding: .35rem .3rem;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s;
    border: none;
    background: none;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
}
.day-btn:active { background: var(--surface2); }
.day-btn.active { background: var(--red); }
.day-btn .db-weekday {
    font-size: .6rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: .2rem;
}
.day-btn.active .db-weekday { color: rgba(255,255,255,.8); }
.day-btn .db-num {
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--text);
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
}
.day-btn.active .db-num { color: white; font-weight: 700; background: none; }
.day-btn.today-btn .db-num { background: var(--red); color: white; font-weight: 700; }
.day-btn.active.today-btn .db-num { background: rgba(255,255,255,.25); }
.day-btn .db-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    margin-top: 2px;
    background: transparent;
}
.day-btn.has-ev .db-dot { background: var(--red2); }
.day-btn.active .db-dot { background: rgba(255,255,255,.7); }

/* CABEÇALHO DO DIA */
.day-heading {
    padding: .6rem 1rem .3rem;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
}
.day-heading-date {
    font-size: .78rem;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .08em;
}
.day-heading-name {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
    margin-top: .1rem;
}

/* LISTA DE EVENTOS DO DIA */
.day-events-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: .6rem 1rem 2rem; }
.day-no-events {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: .88rem;
    gap: .5rem;
    min-height: 120px;
}
.day-no-events .icon { font-size: 2rem; opacity: .3; }
.event-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red2);
    border-radius: 12px;
    padding: .9rem 1rem;
    margin-bottom: .7rem;
    cursor: pointer;
    transition: all .18s;
    -webkit-tap-highlight-color: transparent;
}
.event-item.var { border-left-color: var(--gold); }
.event-item:active { background: var(--surface2); transform: scale(.99); }
.event-item-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: .3rem;
    line-height: 1.3;
}
.event-item-meta {
    font-size: .72rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: .5rem;
    flex-wrap: wrap;
}
.event-item-badge {
    font-size: .65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: .15rem .5rem;
    border-radius: 20px;
}
.badge-fixo { background: rgba(255,107,107,.12); color: var(--red2); }
.badge-var { background: rgba(255,214,10,.12); color: var(--gold); }

/* ========== MODAL DETALHE ========== */
.modal-overlay {
    position: fixed; top: 0; right: 0; bottom: 0; left: 0;
    background: rgba(0,0,0,.8);
    backdrop-filter: blur(8px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 9000;
}
.modal-overlay.open { display: flex; }
.detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 1.5rem 1.5rem 3rem;
    width: 100%;
    max-width: 540px;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
    animation: slideUp .28s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.detail-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 1.2rem; }
.detail-date { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: .35rem; }
.detail-title { font-size: 1.35rem; font-weight: 700; color: var(--red2); line-height: 1.3; margin-bottom: .8rem; }
.detail-badges { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1rem; }
.detail-divider { border: none; border-top: 1px solid var(--border); margin: .9rem 0; }
.detail-section { margin-bottom: .85rem; }
.detail-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: .25rem; }
.detail-value { font-size: .88rem; color: var(--text); line-height: 1.65; }
.detail-acao {
    background: rgba(230,57,70,.07);
    border: 1px solid rgba(230,57,70,.18);
    border-radius: 10px;
    padding: .8rem;
}
.detail-acao .detail-label { color: var(--red2); }
.btn-close-detail {
    position: absolute; top: 1.2rem; right: 1.2rem;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: .3rem .8rem;
    color: var(--muted); cursor: pointer;
    font-size: .78rem; font-family: 'DM Sans', sans-serif;
    transition: all .2s;
}
.btn-close-detail:hover { color: var(--red); border-color: var(--red); }

/* ========== ADMIN EDIÇÃO ========== */
.btn-edit-ev {
    position: absolute; top: .7rem; right: .7rem;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: .25rem .6rem;
    color: var(--muted); font-size: .72rem; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all .2s;
    opacity: 0;
}
.event-item:hover .btn-edit-ev { opacity: 1; }
.event-item { position: relative; }

/* MODAL SENHA ADMIN */
#pwd-modal {
    position: fixed; top:0; right:0; bottom:0; left:0;
    background: rgba(0,0,0,.8); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center;
    z-index: 9100; padding: 1rem;
}
#pwd-modal.open { display: flex; }
.pwd-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 2rem; width: 100%; max-width: 340px; text-align: center;
}
.pwd-box h3 { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: .3rem; }
.pwd-box p { font-size: .8rem; color: var(--muted); margin-bottom: 1.2rem; }
.pwd-box input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: .75rem 1rem; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 1.1rem;
    letter-spacing: .2em; text-align: center; outline: none;
    margin-bottom: .8rem; transition: border .2s;
}
.pwd-box input:focus { border-color: var(--red); }
.pwd-error { color: var(--red2); font-size: .8rem; margin-bottom: .8rem; display: none; }
.pwd-actions { display: flex; gap: .6rem; }
.btn-pwd-ok {
    flex: 1; background: var(--red); color: white; border: none;
    border-radius: 10px; padding: .75rem; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: filter .2s;
}
.btn-pwd-ok:hover { filter: brightness(1.15); }
.btn-pwd-cancel {
    background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
    border-radius: 10px; padding: .75rem 1.2rem; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
}

/* MODAL EDIÇÃO */
#edit-modal {
    position: fixed; top:0; right:0; bottom:0; left:0;
    background: rgba(0,0,0,.85); backdrop-filter: blur(8px);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 9200; padding: 0;
}
#edit-modal.open { display: flex; }
.edit-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px 24px 0 0; padding: 1.5rem 1.5rem 3rem;
    width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto;
    animation: slideUp .28s cubic-bezier(.4,0,.2,1);
}
.edit-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 1.2rem; }
.edit-title { font-size: 1rem; font-weight: 700; color: var(--red2); margin-bottom: 1.2rem; display: flex; align-items: center; gap: .5rem; }
.edit-group { margin-bottom: .9rem; }
.edit-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: .3rem; }
.edit-group input, .edit-group select, .edit-group textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: .7rem .9rem; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: .92rem; outline: none;
    transition: border .2s; resize: vertical;
}
.edit-group input:focus, .edit-group select:focus, .edit-group textarea:focus { border-color: var(--red); }
.edit-group textarea { min-height: 60px; }
.edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
.edit-actions { display: flex; gap: .7rem; margin-top: 1.2rem; }
.btn-save-ev {
    flex: 1; background: var(--red); color: white; border: none;
    border-radius: 10px; padding: .85rem; font-weight: 600;
    font-family: 'DM Sans', sans-serif; font-size: .95rem; cursor: pointer; transition: filter .2s;
}
.btn-save-ev:hover { filter: brightness(1.1); }
.btn-cancel-ev {
    background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
    border-radius: 10px; padding: .85rem 1.4rem; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
}

#toast {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%) translateY(2rem);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: .6rem 1.3rem;
    border-radius: 20px; font-size: .82rem;
    z-index: 9999; opacity: 0; transition: all .3s;
    white-space: nowrap; pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ========== TELA 1 — ANO ========== -->
<div class="screen active" id="screen-year">
    <div class="year-header" style="flex-direction:column;align-items:center;justify-content:center;">
        <img id="logo-pref" class="year-logo" src="./Marca Prefeitura .PNG" alt="Prefeitura São José de Ribamar" onclick="window.open('https://elysampaio2021-blip.github.io/semtur-cultural','_blank')" style="height:80px;margin-bottom:.5rem;">
        <div class="year-number" style="font-size:3rem;text-align:center;">2026</div>
        <div style="font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.15em;margin-top:.1rem;">Calendário Cultural</div>
    </div>
    <div class="legenda">
        <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div> Hoje</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--red2)"></div> Fixo</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--gold)"></div> Variável</div>
    </div>
    <div class="year-grid-wrap">
        <div class="year-grid" id="year-grid">
            <div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--muted)">Carregando...</div>
        </div>
    </div>
</div>

<!-- ========== TELA 2 — MÊS ========== -->
<div class="screen hidden-right" id="screen-month">
    <div class="nav-bar">
        <button class="nav-back" onclick="goToYear()">
            <svg viewBox="0 0 10 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9,1 1,8 9,15"/>
            </svg>
            2026
        </button>
        <div class="nav-title" id="nav-month-title">Janeiro</div>
        <div class="nav-right"></div>
    </div>
    <div class="month-view-header">
        <div class="month-view-name" id="month-view-name">Janeiro</div>
    </div>
    <div class="month-wdays" id="month-wdays">
        <div class="month-wday">D</div>
        <div class="month-wday">S</div>

var db = null;

function initFirebase() {
    try {
        var firebaseConfig = {
            apiKey: "AIzaSyAqcl6zDFgXoF3HC1cThraYI0RboQ1f414",
            authDomain: "semtur-cultural.firebaseapp.com",
            projectId: "semtur-cultural",

            messagingSenderId: "997033445071",

        };
        if (!firebase.apps || !firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        db = firebase.firestore();
        return true;
    } catch(e) {
        console.warn('Firebase não disponível:', e);
        return false;
    }
}

function loadEvents() {
    if (!initFirebase() || !db) {
        allEvents = EVENTOS_BASE;
        renderYearView();
        return;
    }
    db.collection('eventos').get().then(function(snapshot) {
        var firebaseEvents = snapshot.docs.map(function(doc) {
            return Object.assign({ id: doc.id }, doc.data());
        });
        // Combinar: Firebase tem prioridade, base como fallback
        allEvents = firebaseEvents.length > 0 ? firebaseEvents : EVENTOS_BASE;
        renderYearView();
    }).catch(function() {
        allEvents = EVENTOS_BASE;
        renderYearView();
    });
}

/* ===== PARSE DATA ===== */
function getDaysForEvent(ev) {
    if (!ev.date) return [];
    var clean = (ev.date + '').replace(/\s/g,'');
    var days = [];
    var m = clean.match(/^(\d+)/);
    if (m) days.push(parseInt(m[1],10));
    var m2 = clean.match(/[ea](\d+)/);
    if (m2) days.push(parseInt(m2[1],10));
    return days;
}
function getEventsForDay(month, day) {
    return allEvents.filter(function(ev) {
        return ev.month == month && getDaysForEvent(ev).indexOf(day) > -1;
    });
}

/* ===== TELA 1: ANO ===== */
function renderYearView() {
    var grid = document.getElementById('year-grid');
    var html = '';
    for (var m = 1; m <= 12; m++) {
        var isCurrent = (m === todayMonth && todayYear === YEAR);
        var firstDay = new Date(YEAR, m-1, 1).getDay();
        var daysInMonth = new Date(YEAR, m, 0).getDate();
        html += '<div class="mini-month' + (isCurrent?' current':'') + '" onclick="openMonth('+m+')">';
        html += '<div class="mini-month-name">' + MESES[m-1] + '</div>';
        html += '<div class="mini-wdays">';
        DIAS_SEM.forEach(function(d){ html += '<div class="mini-wday">'+d+'</div>'; });
        html += '</div><div class="mini-days">';
        for (var e=0; e<firstDay; e++) html += '<div class="mini-day empty"></div>';
        for (var d=1; d<=daysInMonth; d++) {
            var dow = new Date(YEAR, m-1, d).getDay();
            var evs = getEventsForDay(m, d);
            var isToday = (d===todayDay && m===todayMonth && todayYear===YEAR);
            var hasVar = evs.some(function(ev){ return (ev.tipo||'fixo')==='variavel'; });
            var cls = 'mini-day';
            if (dow===0) cls += ' sun';
            if (dow===6) cls += ' sat';
            if (isToday) cls += ' today';
            if (evs.length>0) cls += (hasVar?' var-ev':' has-ev');
            html += '<div class="'+cls+'">'+d+'</div>';
        }
        html += '</div></div>';
    }
    grid.innerHTML = html;
}

/* ===== TELA 2: MÊS ===== */
function openMonth(m) {
    currentMonth = m;
    document.getElementById('nav-month-title').textContent = MESES[m-1];
    document.getElementById('month-view-name').textContent = MESES[m-1];
    renderMonthView(m);
    goScreen('screen-year','screen-month');
}

function renderMonthView(m) {
    var firstDay = new Date(YEAR, m-1, 1).getDay();
    var daysInMonth = new Date(YEAR, m, 0).getDate();
    var html = '';
    for (var e=0; e<firstDay; e++) html += '<div class="month-day-cell empty"></div>';
    for (var d=1; d<=daysInMonth; d++) {
        var dow = new Date(YEAR, m-1, d).getDay();
        var evs = getEventsForDay(m, d);
        var isToday = (d===todayDay && m===todayMonth && todayYear===YEAR);
        var hasVar = evs.some(function(ev){ return (ev.tipo||'fixo')==='variavel'; });
        var cls = 'month-day-cell clickable';
        if (dow===0) cls += ' sun';
        if (dow===6) cls += ' sat';
        if (isToday) cls += ' today';
        if (evs.length>0) cls += ' has-event';
        var dd = d;
        var onclick = ' onclick="openDay('+m+','+dd+')"';
        html += '<div class="'+cls+'"'+onclick+'>';
        html += '<div class="month-day-num">'+d+'</div>';
        if (evs.length>0) {
            html += '<div class="month-ev-dots">';
            evs.slice(0,3).forEach(function(ev){
                html += '<div class="month-ev-dot'+(((ev.tipo||'fixo')==='variavel')?' var':'')+'"></div>';
            });
            html += '</div>';
            if (evs.length===1) {
                var shortTitle = (evs[0].title||'').split('/')[0].trim().substring(0,12);
                html += '<div class="month-ev-label">'+shortTitle+'</div>';
            } else {
                html += '<div class="month-ev-label">'+evs.length+' eventos</div>';
            }
        }
        html += '</div>';
    }
    document.getElementById('month-days-grid').innerHTML = html;
}

/* ===== TELA 3: DIA ===== */
function openDay(m, d) {
    currentMonth = m;
    currentDay = d;
    document.getElementById('nav-day-back-label').textContent = MESES[m-1];
    document.getElementById('nav-day-title').textContent = MESES_SHORT[m-1] + ' 2026';
    renderDayBar(m, d);
    renderDayEvents(m, d);
    goScreen('screen-month','screen-day');
}

function renderDayBar(m, selectedDay) {
    var daysInMonth = new Date(YEAR, m, 0).getDate();
    document.getElementById('day-bar-month-label').textContent = MESES[m-1] + ' 2026';
    var html = '';
    for (var d=1; d<=daysInMonth; d++) {
        var dow = new Date(YEAR, m-1, d).getDay();
        var evs = getEventsForDay(m, d);
        var isToday = (d===todayDay && m===todayMonth && todayYear===YEAR);
        var isActive = (d === selectedDay);
        var cls = 'day-btn';
        if (isActive) cls += ' active';
        if (isToday) cls += ' today-btn';
        if (evs.length>0 && !isActive) cls += ' has-ev';
        var dd = d;
        html += '<button class="'+cls+'" onclick="selectDay('+dd+')">';
        html += '<span class="db-weekday">'+DIAS_SEM[dow]+'</span>';
        html += '<span class="db-num">'+d+'</span>';
        html += '<span class="db-dot"></span>';
        html += '</button>';
    }
    document.getElementById('day-bar').innerHTML = html;
    // Scroll para o dia selecionado
    setTimeout(function(){
        var bar = document.getElementById('day-bar');
        var active = bar.querySelector('.active');
        if (active) {
            var offset = active.offsetLeft - (bar.clientWidth/2) + (active.clientWidth/2);
            bar.scrollLeft = offset;
        }
    }, 50);
}

function selectDay(d) {
    currentDay = d;
    renderDayBar(currentMonth, d);
    renderDayEvents(currentMonth, d);
}

function renderDayEvents(m, d) {
    var dow = new Date(YEAR, m-1, d).getDay();
    var isToday = (d===todayDay && m===todayMonth && todayYear===YEAR);
    var dateStr = (isToday ? 'Hoje — ' : '') + DIAS_FULL[dow] + ' — ' + d + ' de ' + MESES[m-1];
    document.getElementById('day-heading-date').textContent = dateStr;
    document.getElementById('day-heading-name').textContent = d + ' de ' + MESES[m-1] + ' de ' + YEAR;

    var evs = getEventsForDay(m, d);
    var list = document.getElementById('day-events-list');
    if (evs.length === 0) {
        list.innerHTML = '<div class="day-no-events"><div class="icon">📭</div><div>Nenhum evento neste dia</div></div>';
        return;
    }
    var html = '';
    evs.forEach(function(ev) {
        var isVar = (ev.tipo||'fixo') === 'variavel';
        html += '<div class="event-item'+(isVar?' var':'')+'" style="cursor:default">';
        html += '<button class="btn-edit-ev" onclick="requestEdit(\''+ev.id+'\')">✏️ Editar</button>';
        html += '<div class="event-item-title">'+(ev.title||'')+'</div>';
        html += '<div class="event-item-meta">';
        html += '<span class="event-item-badge '+(isVar?'badge-var':'badge-fixo')+'">'+(isVar?'📌 Variável':'📅 Fixo')+'</span>';
        if (ev.category) html += '<span>'+ev.category+'</span>';
        html += '</div>';
        if (ev.objetivo) html += '<div style="font-size:.78rem;color:var(--muted);margin-top:.35rem;line-height:1.5;">'+ev.objetivo.substring(0,80)+(ev.objetivo.length>80?'…':'')+'</div>';
        html += '</div>';
    });
    list.innerHTML = html;
}

/* ===== ADMIN ===== */
var ADMIN_PWD = '168000';
var pendingEditId = null;

function requestEdit(id) {
    pendingEditId = id;
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-error').style.display = 'none';
    document.getElementById('pwd-modal').classList.add('open');
    setTimeout(function(){ document.getElementById('pwd-input').focus(); }, 200);
}
function closePwd() {
    document.getElementById('pwd-modal').classList.remove('open');
    pendingEditId = null;
}
function checkPwd() {
    var val = document.getElementById('pwd-input').value;
    if (val === ADMIN_PWD) {
        document.getElementById('pwd-modal').classList.remove('open');
        openEdit(pendingEditId);
    } else {
        document.getElementById('pwd-error').style.display = 'block';
        document.getElementById('pwd-input').value = '';
        document.getElementById('pwd-input').focus();
    }
}
document.addEventListener('keyup', function(e){
    if (e.key === 'Enter' && document.getElementById('pwd-modal').classList.contains('open')) checkPwd();
});

function openEdit(id) {
    var ev = allEvents.find(function(e){ return e.id===id; });
    if (!ev) return;
    document.getElementById('edit-id').value      = ev.id;
    document.getElementById('edit-title').value   = ev.title||'';
    document.getElementById('edit-category').value= ev.category||'folclore';
    document.getElementById('edit-tipo').value    = ev.tipo||'fixo';
    document.getElementById('edit-obj').value     = ev.objetivo||'';
    document.getElementById('edit-acao').value    = ev.metodologia||'';
    document.getElementById('edit-atv').value     = ev.atividades||'';
    document.getElementById('edit-modal').classList.add('open');
}
function closeEdit() {
    document.getElementById('edit-modal').classList.remove('open');
}
function saveEdit() {
    var id    = document.getElementById('edit-id').value;
    var title = document.getElementById('edit-title').value.trim();
    var cat   = document.getElementById('edit-category').value;
    var tipo  = document.getElementById('edit-tipo').value;
    var obj   = document.getElementById('edit-obj').value.trim();
    var acao  = document.getElementById('edit-acao').value.trim();
    var atv   = document.getElementById('edit-atv').value.trim();
    if (!title) { showToast('O título não pode ser vazio.'); return; }

    // Atualizar localmente
    var idx = allEvents.findIndex(function(e){ return e.id===id; });
    if (idx > -1) {
        allEvents[idx].title      = title;
        allEvents[idx].category   = cat;
        allEvents[idx].tipo       = tipo;
        allEvents[idx].objetivo   = obj;
        allEvents[idx].metodologia= acao;
        allEvents[idx].atividades = atv;
    }

    // Salvar no Firebase
    if (db) {
        db.collection('eventos').doc(id).update({
            title: title, category: cat, tipo: tipo,
            objetivo: obj, metodologia: acao, atividades: atv
        }).then(function(){
            showToast('✅ Evento salvo com sucesso!');
        }).catch(function(){
            showToast('⚠️ Salvo localmente. Reconecte para sincronizar.');
        });
    } else {
        showToast('✅ Alteração salva!');
    }

    closeEdit();
    renderDayEvents(currentMonth, currentDay);
    renderYearView();
}

/* ===== NAVEGAÇÃO ===== */
function goScreen(from, to) {
    document.getElementById(from).classList.remove('active');
    document.getElementById(from).classList.add('hidden-left');
    document.getElementById(to).classList.remove('hidden-right');
    document.getElementById(to).classList.add('active');
}
function goBack(current, prev) {
    document.getElementById(current).classList.remove('active');
    document.getElementById(current).classList.add('hidden-right');
    document.getElementById(prev).classList.remove('hidden-left');
    document.getElementById(prev).classList.add('active');
}
function goToYear() { goBack('screen-month','screen-year'); }
function goToMonth() { goBack('screen-day','screen-month'); }

/* ===== INIT ===== */
window.addEventListener('DOMContentLoaded', function() {
    // Carregar Firebase dinamicamente e depois os eventos
    var s1 = document.createElement('script');
    s1.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
    s1.onload = function() {
        var s2 = document.createElement('script');
        s2.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js';
        s2.onload = function() { loadEvents(); };
        s2.onerror = function() { renderYearView(); };
        document.head.appendChild(s2);
    };
    s1.onerror = function() { renderYearView(); };
    document.head.appendChild(s1);
    loadEvents();
    // Se hoje é 2026, abre no mês atual
    if (todayYear === YEAR) {
        // opcional: abrir direto no mês atual
        // openMonth(todayMonth);
    }
});
