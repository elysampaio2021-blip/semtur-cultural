<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>Calendário Cultural 2026 — SEMTUR São José de Ribamar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --red: #e63946;
    --red2: #ff6b6b;
    --gold: #ffd60a;
    --text: #f0f0f5;
    --muted: #7070a0;
    --white: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #0a0a0f 0%, #1a0a1a 50%, #0a0a1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 1rem 1rem;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
}
.header-year {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--red);
    line-height: 1;
    letter-spacing: -2px;
}
.header-title {
    font-size: .78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .15em;
    margin-top: .2rem;
}
.header-actions {
    display: flex;
    justify-content: center;
    gap: .5rem;
    margin-top: .8rem;
}
.btn-today {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: .4rem 1rem;
    border-radius: 20px;
    font-size: .78rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .2s;
}
.btn-today:hover, .btn-today.active {
    border-color: var(--red);
    color: var(--red);
}

/* GRID CALENDÁRIO */
.calendar-container {
    padding: 1rem;
    max-width: 900px;
    margin: 0 auto;
}
.calendar-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
}
@media(max-width: 600px) {
    .calendar-grid { grid-template-columns: 1fr; gap: .75rem; }
    .header-year { font-size: 2.8rem; }
}
@media(min-width: 601px) and (max-width: 900px) {
    .calendar-grid { grid-template-columns: repeat(2, 1fr); }
}

/* CARD DE MÊS */
.month-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1rem;
    transition: border-color .2s;
}
.month-card.current-month {
    border-color: var(--red);
    box-shadow: 0 0 20px rgba(230,57,70,.15);
}
.month-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: .6rem;
    color: var(--text);
}
.month-card.current-month .month-name { color: var(--red); }

/* DIAS DA SEMANA */
.weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 3px;
}
.weekday {
    text-align: center;
    font-size: .6rem;
    color: var(--muted);
    text-transform: uppercase;
    padding: 2px 0;
}
.weekday:first-child { color: var(--red2); }
.weekday:last-child { color: var(--red2); }

/* DIAS */
.days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
}
.day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: .72rem;
    cursor: default;
    position: relative;
    transition: all .15s;
    font-weight: 400;
}
.day.empty { color: transparent; }
.day.sunday, .day.saturday { color: var(--red2); opacity: .7; }
.day.today {
    background: var(--red);
    color: white;
    font-weight: 700;
    border-radius: 50%;
}
.day.has-event {
    cursor: pointer;
    font-weight: 700;
    color: var(--white);
}
.day.has-event::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--red);
}
.day.has-event:hover {
    background: var(--surface2);
    transform: scale(1.15);
}
.day.today.has-event::after { background: white; }
.day.variavel::after { background: var(--gold); }

/* MODAL EVENTO */
.modal-overlay {
    position: fixed;
    top: 0; right: 0; bottom: 0; left: 0;
    background: rgba(0,0,0,.85);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9000;
    padding: 1rem;
}
.modal-overlay.open { display: flex; }
.event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 1.8rem;
    width: 100%;
    max-width: 420px;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
}
.event-card-date {
    font-size: .75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-bottom: .5rem;
}
.event-card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--red);
    line-height: 1.3;
    margin-bottom: 1rem;
}
.event-card-badge {
    display: inline-flex;
    align-items: center;
    gap: .3rem;
    font-size: .7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    padding: .3rem .7rem;
    border-radius: 20px;
    margin-bottom: 1rem;
}
.badge-fixo { background: rgba(230,57,70,.15); color: var(--red2); }
.badge-variavel { background: rgba(255,214,10,.12); color: var(--gold); }
.event-divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
.event-section { margin-bottom: .9rem; }
.event-label {
    font-size: .65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: .3rem;
}
.event-value {
    font-size: .88rem;
    color: var(--text);
    line-height: 1.6;
}
.event-acao {
    background: rgba(230,57,70,.08);
    border: 1px solid rgba(230,57,70,.2);
    border-radius: 12px;
    padding: .9rem;
    margin-top: .5rem;
}
.event-acao .event-label { color: var(--red2); }
.btn-close-event {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .4rem .8rem;
    color: var(--muted);
    cursor: pointer;
    font-size: .78rem;
    font-family: 'DM Sans', sans-serif;
    transition: all .2s;
}
.btn-close-event:hover { color: var(--red); border-color: var(--red); }

/* MULTI EVENTOS */
.multi-event-item {
    padding: .7rem 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: all .2s;
}
.multi-event-item:last-child { border-bottom: none; }
.multi-event-item:hover { padding-left: .5rem; }
.multi-event-name {
    font-weight: 600;
    font-size: .9rem;
    color: var(--text);
    margin-bottom: .2rem;
}
.multi-event-cat {
    font-size: .7rem;
    color: var(--muted);
    text-transform: uppercase;
}

/* LEGENDA */
.legenda {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    padding: .75rem 1rem;
    flex-wrap: wrap;
}
.leg-item {
    display: flex;
    align-items: center;
    gap: .4rem;
    font-size: .72rem;
    color: var(--muted);
}
.leg-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 1.5rem 1rem 2rem;
    color: var(--muted);
    font-size: .75rem;
    border-top: 1px solid var(--border);
    margin-top: 1rem;
}
footer strong { color: var(--red); }

/* TOAST */
#toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(2rem);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: .7rem 1.4rem;
    border-radius: 20px;
    font-size: .83rem;
    z-index: 9999;
    opacity: 0;
    transition: all .3s;
    white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* LOADING */
.loading {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: .9rem;
}
.loading-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 1s infinite;
    margin: 0 2px;
}
.loading-dot:nth-child(2) { animation-delay: .2s; }
.loading-dot:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }
</style>
</head>
<body>

<div class="header">
    <div class="header-year">2026</div>
    <div class="header-title">Calendário Cultural • SEMTUR • São José de Ribamar</div>
    <div class="header-actions">
        <button class="btn-today" onclick="scrollToToday()">📍 Hoje</button>
        <button class="btn-today" onclick="scrollToTop()">📅 Ano todo</button>
    </div>
</div>

<div class="legenda">
    <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div> Hoje</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--red2)"></div> Evento Fixo</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--gold)"></div> Evento Variável</div>
</div>

<div class="calendar-container">
    <div class="calendar-grid" id="calendar-grid">
        <div class="loading">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
    </div>
</div>

<footer>
    <strong>Gestão de Eventos e Calendário Cultural 2026 — SEMTUR</strong><br>
    Cidade de Fé, Tradição e Cultura • São José de Ribamar, MA
</footer>

<!-- MODAL EVENTO ÚNICO -->
<div class="modal-overlay" id="event-modal">
    <div class="event-card">
        <button class="btn-close-event" onclick="closeModal()">✕ Fechar</button>
        <div class="event-card-date" id="ev-date"></div>
        <div class="event-card-title" id="ev-title"></div>
        <div id="ev-badge"></div>
        <div class="event-divider"></div>
        <div class="event-section">
            <div class="event-label">🎯 Objetivo</div>
            <div class="event-value" id="ev-obj"></div>
        </div>
        <div class="event-section" id="ev-atividades-wrap">
            <div class="event-label">📋 Atividades</div>
            <div class="event-value" id="ev-atv"></div>
        </div>
        <div class="event-section" id="ev-acao-wrap" style="display:none;">
            <div class="event-acao">
                <div class="event-label">🏛️ Ação SEMTUR</div>
                <div class="event-value" id="ev-acao"></div>
            </div>
        </div>
        <div class="event-divider"></div>
        <div class="event-section">
            <div class="event-label">👥 Público-Alvo</div>
            <div class="event-value" id="ev-pub"></div>
        </div>
        <div class="event-section">
            <div class="event-label">📍 Local / Responsáveis</div>
            <div class="event-value" id="ev-resp"></div>
        </div>
    </div>
</div>

<!-- MODAL MULTI EVENTOS -->
<div class="modal-overlay" id="multi-modal">
    <div class="event-card">
        <button class="btn-close-event" onclick="closeMultiModal()">✕ Fechar</button>
        <div class="event-card-date" id="multi-date"></div>
        <div class="event-card-title" style="font-size:1.1rem;" id="multi-title">Eventos do dia</div>
        <div class="event-divider"></div>
        <div id="multi-list"></div>
    </div>
</div>

<div id="toast"></div>

<script>
/* ===== FIREBASE ===== */
var firebaseConfig = {
    apiKey: "AIzaSyAqcl6zDFgXoF3HC1cThraYI0RboQ1f414",
    authDomain: "semtur-cultural.firebaseapp.com",
    projectId: "semtur-cultural",
    storageBucket: "semtur-cultural.firebasestorage.app",
    messagingSenderId: "997033445071",
    appId: "1:997033445071:web:6ee0939f12562f943a19ba"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

/* ===== CONFIG ===== */
var YEAR = 2026;
var MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var DIAS_SEM = ['D','S','T','Q','Q','S','S'];
var today = new Date();
var todayDay   = today.getDate();
var todayMonth = today.getMonth() + 1;
var todayYear  = today.getFullYear();

var allEvents = [];
var selectedEvent = null;

/* ===== CARREGAR EVENTOS ===== */
function loadEvents() {
    db.collection('eventos').get().then(function(snapshot) {
        allEvents = snapshot.docs.map(function(doc) {
            return Object.assign({ id: doc.id }, doc.data());
        });
        renderCalendar();
    }).catch(function(err) {
        console.error('Erro:', err);
        renderCalendar();
    });
}

/* ===== PARSE DATA ===== */
function parseDay(dateStr) {
    if (!dateStr) return [];
    // Formato: "19/03", "05 e 06/07", "15 a 17/02"
    var days = [];
    var clean = dateStr.replace(/\s/g, '');
    // Pegar apenas o primeiro número (dia principal)
    var match = clean.match(/^(\d+)/);
    if (match) days.push(parseInt(match[1], 10));
    // Se tem "e" ou "a", pegar segundo número
    var match2 = clean.match(/[ea](\d+)/);
    if (match2) days.push(parseInt(match2[1], 10));
    return days;
}

/* ===== MAPEAR EVENTOS POR DIA ===== */
function getEventsForDay(month, day) {
    return allEvents.filter(function(ev) {
        if (ev.month != month) return false;
        var days = parseDay(ev.date);
        return days.indexOf(day) > -1;
    });
}

/* ===== RENDER CALENDÁRIO ===== */
function renderCalendar() {
    var grid = document.getElementById('calendar-grid');
    var html = '';

    for (var m = 1; m <= 12; m++) {
        var isCurrentMonth = (m === todayMonth && todayYear === YEAR);
        var firstDay = new Date(YEAR, m - 1, 1).getDay(); // 0=Dom
        var daysInMonth = new Date(YEAR, m, 0).getDate();

        html += '<div class="month-card' + (isCurrentMonth ? ' current-month' : '') + '" id="month-' + m + '">';
        html += '<div class="month-name">' + MESES[m-1] + '</div>';

        // Dias da semana
        html += '<div class="weekdays">';
        DIAS_SEM.forEach(function(d) { html += '<div class="weekday">' + d + '</div>'; });
        html += '</div>';

        // Dias
        html += '<div class="days-grid">';

        // Espaços vazios antes do dia 1
        for (var e = 0; e < firstDay; e++) {
            html += '<div class="day empty"></div>';
        }

        for (var d = 1; d <= daysInMonth; d++) {
            var dayOfWeek = new Date(YEAR, m - 1, d).getDay();
            var evs = getEventsForDay(m, d);
            var isToday = (d === todayDay && m === todayMonth && todayYear === YEAR);
            var hasVariavel = evs.some(function(e) { return (e.tipo||'fixo') === 'variavel'; });

            var cls = 'day';
            if (dayOfWeek === 0) cls += ' sunday';
            if (dayOfWeek === 6) cls += ' saturday';
            if (isToday) cls += ' today';
            if (evs.length > 0) cls += ' has-event';
            if (hasVariavel && evs.length > 0) cls += ' variavel';

            var onclick = '';
            if (evs.length === 1) {
                onclick = ' onclick="showEvent(\'' + evs[0].id + '\',' + m + ',' + d + ')"';
            } else if (evs.length > 1) {
                onclick = ' onclick="showMultiEvents(' + m + ',' + d + ')"';
            }

            html += '<div class="' + cls + '"' + onclick + '>' + d + '</div>';
        }

        html += '</div></div>';
    }

    grid.innerHTML = html;
}

/* ===== MOSTRAR EVENTO ===== */
function showEvent(id, month, day) {
    var ev = null;
    for (var i = 0; i < allEvents.length; i++) {
        if (allEvents[i].id === id) { ev = allEvents[i]; break; }
    }
    if (!ev) return;

    document.getElementById('ev-date').textContent = (ev.date || day + '/' + (month < 10 ? '0'+month : month)) + ' — ' + MESES[month-1];
    document.getElementById('ev-title').textContent = ev.title || '';

    var tipo = ev.tipo || 'fixo';
    var badgeHtml = '<span class="event-card-badge ' + (tipo === 'variavel' ? 'badge-variavel' : 'badge-fixo') + '">' +
        (tipo === 'variavel' ? '📌 Variável' : '📅 Fixo') + ' • ' + (ev.category || '') + '</span>';
    document.getElementById('ev-badge').innerHTML = badgeHtml;

    document.getElementById('ev-obj').textContent = ev.objetivo || '—';
    document.getElementById('ev-atv').textContent = ev.atividades || '—';
    document.getElementById('ev-pub').textContent = ev.publico || '—';
    document.getElementById('ev-resp').textContent = ev.responsaveis || '—';

    // Ação SEMTUR = metodologia ou resultados
    var acao = ev.metodologia || ev.resultados || '';
    if (acao) {
        document.getElementById('ev-acao').textContent = acao;
        document.getElementById('ev-acao-wrap').style.display = 'block';
    } else {
        document.getElementById('ev-acao-wrap').style.display = 'none';
    }

    document.getElementById('event-modal').classList.add('open');
}

/* ===== MULTI EVENTOS ===== */
function showMultiEvents(month, day) {
    var evs = getEventsForDay(month, day);
    document.getElementById('multi-date').textContent = day + ' de ' + MESES[month-1];
    document.getElementById('multi-title').textContent = evs.length + ' eventos neste dia';

    var html = '';
    evs.forEach(function(ev) {
        html += '<div class="multi-event-item" onclick="closeMultiModal();showEvent(\'' + ev.id + '\',' + month + ',' + day + ')">';
        html += '<div class="multi-event-name">' + (ev.title||'') + '</div>';
        html += '<div class="multi-event-cat">' + (ev.category||'') + ' • ' + ((ev.tipo||'fixo')==='variavel'?'📌 Variável':'📅 Fixo') + '</div>';
        html += '</div>';
    });
    document.getElementById('multi-list').innerHTML = html;
    document.getElementById('multi-modal').classList.add('open');
}

function closeModal() { document.getElementById('event-modal').classList.remove('open'); }
function closeMultiModal() { document.getElementById('multi-modal').classList.remove('open'); }

document.getElementById('event-modal').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
document.getElementById('multi-modal').addEventListener('click', function(e) { if(e.target===this) closeMultiModal(); });

/* ===== NAVEGAÇÃO ===== */
function scrollToToday() {
    var el = document.getElementById('month-' + todayMonth);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ===== INIT ===== */
window.addEventListener('DOMContentLoaded', function() {
    loadEvents();
});
</script>
</body>
</html>
